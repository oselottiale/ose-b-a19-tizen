<!DOCTYPE html>
    <div id="refreshOverlay" style="display: none;">
        <div class="overlay-content">
            <p>Päivitetään voit sulkea sivun milloin tahansa.</p>
            <div id="statusBox" style="display: none;"></div>
            <div id="timer" style="display: none; font-size: 26px; color: black; margin-top: 20px; font-family: Arial, Helvetica, sans-serif;">Aikaa jäljellä: 1:10</div>
        </div>
    </div>


    
    
    
    <div class="box">
        <img src="https://t4.oseale.com/oseale-logo.png" width="100px" height="100px">
        <h1>Ohjauspaneeli</h1>
        <h2 style="display: none;">Made by oseale in 2025</h2>
        <a><button class="margin_top" id="startButton">Päivitä kaikki esitykset.</button></a>
        <a href="https://t4.oseale.com/linktree.html"><button>🡨 Takaisin</button></a>
        <a href="https://t4.oseale.com/slides-edit-login/menu-auth.html" style="display: none;"><button>Muokkaa ruokalistan sisältöä</button></a>
        <div class="dropdown">
        <button class="dropbtn" id="dropdownToggle" style="display: none;">Valikko ⌄</button>
        <div class="dropdown-content" id="dropdownMenu">
            <a href="https://t4.oseale.com/cpanel/sheets-auth.html">Sheets ohjauspaneeli</a>
            <a href="https://script.google.com/home/projects/1T1lyWuX-FrJ6XsdJxoLPW--NhUgqPmSWlBSs7n2FVVAyitfwjc3mUnyE/edit">Google apps script (Etä päivitys)</a>
            <a href="https://script.google.com/home/projects/13eG0tXEP2T4Rybifdsgmkcx0NIAkgijqTRLrchRNvqvqV4aacuoy6umH/edit">Google apps script (Ruokalista päivitys)</a>
            <a href="https://t4.oseale.com/inner.html">Uusin (v2) versio sisäinen</a>
            <a href="https://t4.oseale.com/inner3.html">Vanha (v1) versio sisäinen</a>
            <a href="https://t4.oseale.com/inner2.html">Beta versio sisäinen</a>
        </div>
        </div>
        <script>
        const toggleBtn = document.getElementById("dropdownToggle");
        const dropdown = document.getElementById("dropdownMenu");

        toggleBtn.addEventListener("click", () => {
        if (dropdown.classList.contains("show")) {
            dropdown.style.maxHeight = dropdown.scrollHeight + "px"; 
            requestAnimationFrame(() => {
            dropdown.style.maxHeight = "0";
            dropdown.classList.remove("show");
            });
        } else {
            dropdown.classList.add("show");
            dropdown.style.maxHeight = dropdown.scrollHeight + "px";
        }
        });
        </script>

        <script>
        const button = document.getElementById("startButton");
        const statusBox = document.getElementById("statusBox");
        const timerDisplay = document.getElementById("timer");
        
        const scriptURL = "https://script.google.com/macros/s/AKfycbyDM6tOlFJKinNRGci53SQRSC37LHeRAhkCE63gUCanySSuhC0YgllClBEOX5fkSscf/exec";
        
        function sendStatus(value, callbackName) {
            const script = document.createElement("script");
            script.src = `${scriptURL}?status=${value}&callback=${callbackName}`;
            document.body.appendChild(script);
        }
        
        function handleStatusSet(data) {
            if (data.success) {
                startCountdown();
                document.getElementById("refreshOverlay").style.display = "flex";
            } else {
                statusBox.style.display = "none";
                statusBox.textContent = "Error setting status. Please try again.";
                button.disabled = false;
                timerDisplay.style.display = "none";
            }
        }
        
        function startCountdown() {
            let secondsLeft = 70;
            statusBox.style.display = "none";
            statusBox.textContent = "Status set to 1.";
            timerDisplay.style.display = "block";
        
            const timer = setInterval(() => {
                secondsLeft--;
                const min = Math.floor(secondsLeft / 60);
                const sec = secondsLeft % 60;
                timerDisplay.textContent = `Aikaa jäljellä: ${min}:${sec.toString().padStart(2, '0')}`;
        
                if (secondsLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById("refreshOverlay").style.display = "none";
                }
            }, 1000);
        }
        
        button.addEventListener("click", () => {
            button.disabled = true;
            sendStatus("1", "handleStatusSet");
            document.getElementById("refreshOverlay").style.display = "flex";
        });
        </script>
        <div class="footer">&copy 2025 Oseale.</div>
    </div>
</html>
