<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Uudelleenohjataan</title>
  <link rel="icon" href="https://dev.oseale.com/images/favicon.png?v=2">
  <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">
  <style>
    #loading {
      width: 100%;
      padding: 40px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .ldr {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 100px;
          height: 100px;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
      }
    
      .hexagon, .ring {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%); 
          margin: 0;
          padding: 0;
      }

    #app {
      display: block;
    }

    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="ldr">
      <svg class="hexagon" viewBox="0 0 50 50">
          <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
      </svg>
      
      <svg class="ring" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="22"></circle>
      </svg>
  </div>

  <div id="app"></div>

  <script src="https://t4.oseale.com/auth.js"></script>
  
  <script type="module" src="https://t4.oseale.com/firebaseauth.js"></script>


</body>
</html>
